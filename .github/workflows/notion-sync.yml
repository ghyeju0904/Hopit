name: Notion 개발 일지 자동 업로드

on:
  # 매일 23:55 KST (UTC 14:55)
  schedule:
    - cron: '55 14 * * *'
  # 수동 실행도 가능
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 10  # 최근 커밋 히스토리

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 시크릿 확인 (디버그)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          if [ -z "$NOTION_TOKEN" ]; then
            echo "❌ NOTION_TOKEN이 비어있음 - 시크릿 등록 확인 필요"
          else
            echo "✅ NOTION_TOKEN 확인됨 (길이: ${#NOTION_TOKEN}자)"
          fi

      - name: Notion 동기화 실행
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_LOG_PAGE_ID: '363ef9f4ad0d81e0a459eb9ee7f18d53'
        run: node scripts/notion-sync.js
